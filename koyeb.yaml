# koyeb.yaml — TaskFlow mono-container deployment config (R40, R41)
# Single web service: nginx (port 8080) + Express (port 4000) + supervisord
# Secrets referenced by name — never hardcoded (R33, R41)

name: taskflow

services:
  - name: web
    type: web
    instance_type: free
    regions:
      - fra  # Frankfurt — closest to Abidjan (~150ms latency)

    scalings:
      - min: 1
        max: 1

    git:
      branch: main
      builder: dockerfile
      dockerfile: Dockerfile

    ports:
      - port: 8080
        protocol: http

    routes:
      - path: /
        port: 8080

    health_checks:
      - http:
          port: 8080
          path: /healthz
          grace_period: 30s
          interval: 30s
          timeout: 5s
          restart_limit: 3

    env:
      # ── Non-secret config ───────────────────────────────────────
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: COOKIE_SECURE
        value: "true"
      - key: EMAIL_FROM
        value: onboarding@resend.dev
      - key: LOG_LEVEL
        value: info

      # ── CORS — update after first deploy with actual *.koyeb.app URL ──
      - key: CORS_ORIGIN
        value: https://taskflow-myorg.koyeb.app

      # ── Secrets — referenced by name, never in clear (R33, R41) ───
      - key: DATABASE_URL
        secret: database-url
      - key: JWT_SECRET
        secret: jwt-secret
      - key: RESEND_API_KEY
        secret: resend-api-key
      - key: UPSTASH_REDIS_URL
        secret: upstash-redis-url
      - key: COOKIE_SECRET
        secret: cookie-secret
