# nginx.conf — serves React build statically, proxies /api/* to Express
# Port: 8080 (Koyeb free tier, non-root)

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile    on;
  tcp_nopush  on;
  tcp_nodelay on;

  keepalive_timeout 65;

  # Gzip compression
  gzip            on;
  gzip_vary       on;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    application/javascript
    application/json
    application/x-javascript
    text/xml
    application/xml
    application/xml+rss
    text/javascript
    image/svg+xml;

  # Logging to stdout/stderr (Docker-friendly, Koyeb-readable)
  access_log /dev/stdout;
  error_log  /dev/stderr;

  server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;

    # ── Static assets with aggressive caching ──────────────────
    location ~* \.(js|css|woff2?|svg|png|jpg|ico|webp)$ {
      add_header Cache-Control "public, max-age=31536000, immutable";
      try_files $uri =404;
    }

    # ── Healthcheck — proxy to Express /healthz ─────────────────
    location = /healthz {
      proxy_pass         http://127.0.0.1:4000/healthz;
      proxy_set_header   Host $host;
      proxy_set_header   X-Forwarded-For    $remote_addr;
      proxy_set_header   X-Forwarded-Proto  $scheme;
      proxy_pass_request_headers on;
    }

    # ── API — proxy to Express ──────────────────────────────────
    location /api/ {
      proxy_pass         http://127.0.0.1:4000;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        keep-alive;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Forwarded-For   $remote_addr;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_pass_request_headers on;
      proxy_cache_bypass $http_upgrade;
    }

    # ── SPA fallback — serve index.html for all other routes ────
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
