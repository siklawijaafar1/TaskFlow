services:

  # ── PostgreSQL 16 (dev) ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: taskflow_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-taskflow_dev}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-taskflow_dev}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - taskflow_dev

  # ── PostgreSQL 16 (test) ────────────────────────────────────────────────────
  postgres_test:
    image: postgres:16-alpine
    container_name: taskflow_postgres_test
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${TEST_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${TEST_DB_PASSWORD:-postgres}
      POSTGRES_DB: ${TEST_DB_NAME:-taskflow_test}
    ports:
      - "${TEST_DB_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TEST_DB_USER:-postgres} -d ${TEST_DB_NAME:-taskflow_test}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - taskflow_dev

  # ── Redis 7 ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: taskflow_redis_dev
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass} --loglevel warning
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - taskflow_dev

  # ── pgAdmin 4 (interface web DB) ────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: taskflow_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@taskflow.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - taskflow_dev

volumes:
  postgres_dev_data:
  redis_dev_data:
  pgadmin_data:

networks:
  taskflow_dev:
    driver: bridge
